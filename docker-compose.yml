services:
  # 1. TRANSACTIONAL DATABASE (Source Data Layer)
  postgres_source:
    image: postgres:15
    container_name: postgres-source-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_source_data:/var/lib/postgresql/data
    networks:
      - gold_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. ANALYTICS ENGINE (Columnar Storage Layer)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-analytics-db
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - gold_network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

# 3a. DAGSTER WEBSERVER
  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster-webserver
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - ./dags_dagster:/opt/dagster/app
      - ./dagster_home:/opt/dagster/dagster_home
      - ./transform_dbt:/opt/dagster/transform_dbt
    working_dir: /opt/dagster/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "mkdir -p /opt/dagster/dagster_home &&
      cd /opt/dagster/transform_dbt && dbt parse &&
      cd /opt/dagster/app &&
      dagster-webserver -h 0.0.0.0 -p 3000 -f retail_pipeline_assest.py"
    networks:
      - gold_network
    depends_on:
      postgres_source:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

# 3b. DAGSTER DAEMON
  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster-daemon
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - ./dags_dagster:/opt/dagster/app
      - ./dagster_home:/opt/dagster/dagster_home
      - ./transform_dbt:/opt/dagster/transform_dbt 
    working_dir: /opt/dagster/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "mkdir -p /opt/dagster/dagster_home &&
      cd /opt/dagster/transform_dbt && dbt parse &&
      cd /opt/dagster/app &&
      sleep 5 &&
      dagster-daemon run -f retail_pipeline_assest.py"
    networks:
      - gold_network
    depends_on:
      postgres_source:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # 4. SUPERSET PRESENTATION LAYER
  superset:
    image: apache/superset:latest
    container_name: superset-viz
    user: "root"
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=highly_secure_random_string_here_12345
      - SUPERSET_HOME=/app/superset_home
    volumes:
      - ./superset_home:/app/superset_home
    entrypoint: >
      /bin/sh -c "
      echo '=== Installing ClickHouse driver ===' &&
      pip install --target=/app/.venv/lib/python3.10/site-packages clickhouse-connect &&
      echo '=== Bootstrapping Superset ===' &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@admin.com --password admin123 || true &&
      superset db upgrade &&
      superset init &&
      echo '=== Starting Superset ===' &&
      /usr/bin/run-server.sh
      "
    networks:
      - gold_network
    depends_on:
      clickhouse:
        condition: service_healthy

  # 5. GRAFANA (Pipeline Monitoring & Alerts)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: pipeline_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_USER}
      - GF_SMTP_FROM_NAME=Pipeline Data Ops Alert
    networks:
      - gold_network
    restart: unless-stopped
    depends_on:
      - clickhouse

volumes:
  pg_source_data:
  clickhouse_data:
  grafana_storage:

networks:
  gold_network:
    name: gold_data_shared_net