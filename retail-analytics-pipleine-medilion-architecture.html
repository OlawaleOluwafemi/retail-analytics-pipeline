<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medallion Architecture Pipeline</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --gold: #ffd700;
            --accent: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(180deg, rgba(15,23,42,0.9) 0%, rgba(15,23,42,0) 100%);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        #diagram {
            width: 100%;
            height: 900px;
            position: relative;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4));
        }

        .node-rect {
            fill: var(--bg-card);
            stroke: var(--border);
            stroke-width: 2px;
            rx: 12;
            transition: all 0.3s ease;
        }

        .node:hover .node-rect {
            stroke: var(--accent);
            stroke-width: 3px;
            fill: var(--bg-hover);
        }

        .node-bronze .node-rect { stroke: var(--bronze); }
        .node-silver .node-rect { stroke: var(--silver); }
        .node-gold .node-rect { stroke: var(--gold); }

        .node-icon {
            font-size: 24px;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .node-title {
            fill: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            text-anchor: middle;
        }

        .node-subtitle {
            fill: var(--text-secondary);
            font-size: 12px;
            text-anchor: middle;
        }

        .node-meta {
            fill: var(--text-secondary);
            font-size: 10px;
            text-anchor: middle;
        }

        .link {
            fill: none;
            stroke-width: 2px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .link:hover {
            opacity: 1;
            stroke-width: 3px;
        }

        .link-label {
            fill: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            text-anchor: middle;
            background: var(--bg-dark);
        }

        .link-label-bg {
            fill: var(--bg-dark);
            opacity: 0.9;
        }

        .particle {
            fill: var(--accent);
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .warehouse-bg {
            fill: rgba(30, 41, 59, 0.5);
            stroke: var(--border);
            stroke-width: 1;
            stroke-dasharray: 8 4;
            rx: 20;
        }

        .warehouse-label {
            fill: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 320px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip h3 {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .tooltip p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }

        .tooltip .tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .legend h4 {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 0.5rem;
        }

        .control-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .flow-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .flow-counter span {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Medallion Architecture Pipeline</h1>
        <p>Data flows from raw ingestion to business-ready analytics</p>
    </div>

    <div class="container">
        <div id="diagram">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Pipeline Active</span>
            </div>

            <div class="legend">
                <h4>Architecture Layers</h4>
                <div class="legend-item">
                    <div class="legend-color" style="border-color: #cd7f32; background: rgba(205,127,50,0.2);"></div>
                    <span>Bronze (Raw)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="border-color: #c0c0c0; background: rgba(192,192,192,0.2);"></div>
                    <span>Silver (Cleaned)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="border-color: #ffd700; background: rgba(255,215,0,0.2);"></div>
                    <span>Gold (Aggregated)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="border-color: #3b82f6; background: rgba(59,130,246,0.2);"></div>
                    <span>Visualization</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="resetZoom()">Reset View</button>
                <button class="control-btn" onclick="toggleParticles()">Toggle Flow</button>
            </div>

            <div class="flow-counter">
                Records Processed: <span id="record-count">0</span>
            </div>

            <div class="tooltip" id="tooltip"></div>
        </div>
    </div>

    <script>
        const width = 1400;
        const height = 900;
        
        const svg = d3.select("#diagram")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet")
            .style("width", "100%")
            .style("height", "100%");

        // Define gradients and filters
        const defs = svg.append("defs");
        
        const glowFilter = defs.append("filter")
            .attr("id", "glow")
            .attr("x", "-50%")
            .attr("y", "-50%")
            .attr("width", "200%")
            .attr("height", "200%");
            
        glowFilter.append("feGaussianBlur")
            .attr("stdDeviation", "3")
            .attr("result", "coloredBlur");
            
        const feMerge = glowFilter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        // Arrow markers
        const arrowTypes = [
            { id: "arrow-default", color: "#64748b" },
            { id: "arrow-bronze", color: "#cd7f32" },
            { id: "arrow-silver", color: "#c0c0c0" },
            { id: "arrow-gold", color: "#ffd700" },
            { id: "arrow-accent", color: "#3b82f6" }
        ];

        arrowTypes.forEach(type => {
            defs.append("marker")
                .attr("id", type.id)
                .attr("viewBox", "0 -5 10 10")
                .attr("refX", 10)
                .attr("refY", 0)
                .attr("markerWidth", 6)
                .attr("markerHeight", 6)
                .attr("orient", "auto")
                .append("path")
                .attr("d", "M0,-5L10,0L0,5")
                .attr("fill", type.color);
        });

        // Data structure
        const nodes = [
            {
                id: "source",
                x: 700, y: 80,
                width: 280, height: 100,
                title: "Operational DB / Retail Source",
                subtitle: "PostgreSQL / MySQL",
                icon: "🗄️",
                layer: "source",
                details: "Primary transactional database handling daily retail operations, inventory, and sales records."
            },
            {
                id: "bronze",
                x: 700, y: 280,
                width: 500, height: 140,
                title: "BRONZE LAYER",
                subtitle: "retail_bronze.raw_transactions",
                icon: "🥉",
                layer: "bronze",
                details: "Raw landing zone. Unaltered text formats straight from source. Append-only historical backup with schema evolution tracking."
            },
            {
                id: "silver",
                x: 700, y: 480,
                width: 500, height: 140,
                title: "SILVER LAYER",
                subtitle: "retail_silver.clean_transactions",
                icon: "🥈",
                layer: "silver",
                details: "Cleaned & structured truth. Deduped records, dropped corrupted rows, proper data types. Raw strings cast to Decimal/Int; dates parsed cleanly."
            },
            {
                id: "gold",
                x: 700, y: 680,
                width: 500, height: 140,
                title: "GOLD LAYER",
                subtitle: "retail_gold.mart_location_performance",
                icon: "🥇",
                layer: "gold",
                details: "Business performance marts. High-velocity aggregation engine using SummingMergeTree. True Date data type enforced to prevent BI errors."
            },
            {
                id: "viz",
                x: 700, y: 880,
                width: 320, height: 100,
                title: "Apache Superset Dashboard",
                subtitle: "Daily Revenue & Top 10 Products",
                icon: "📊",
                layer: "viz",
                details: "Interactive BI layer with real-time ClickHouse driver connection. Daily revenue trends and top 10 product performance charts."
            }
        ];

        const links = [
            {
                source: "source", target: "bronze",
                label: "Ingested via Airbyte",
                color: "#64748b",
                marker: "arrow-default"
            },
            {
                source: "bronze", target: "silver",
                label: "Dagster: Data Cleansing & Casting",
                color: "#cd7f32",
                marker: "arrow-bronze"
            },
            {
                source: "silver", target: "gold",
                label: "Dagster: Aggregations & Joins",
                color: "#c0c0c0",
                marker: "arrow-silver"
            },
            {
                source: "gold", target: "viz",
                label: "ClickHouse Native Driver",
                color: "#ffd700",
                marker: "arrow-gold"
            }
        ];

        // Draw warehouse background
        const warehouseGroup = svg.append("g").attr("class", "warehouse-group");
        
        warehouseGroup.append("rect")
            .attr("class", "warehouse-bg")
            .attr("x", 150)
            .attr("y", 200)
            .attr("width", 1100)
            .attr("height", 600);

        warehouseGroup.append("text")
            .attr("class", "warehouse-label")
            .attr("x", 700)
            .attr("y", 235)
            .text("CLICKHOUSE DATA WAREHOUSE");

        // Draw links
        const linkGroup = svg.append("g").attr("class", "links");
        
        const linkElements = linkGroup.selectAll(".link")
            .data(links)
            .enter()
            .append("g")
            .attr("class", "link-group");

        // Link paths
        const linkPaths = linkElements.append("path")
            .attr("class", "link")
            .attr("stroke", d => d.color)
            .attr("marker-end", d => `url(#${d.marker})`)
            .attr("d", d => {
                const s = nodes.find(n => n.id === d.source);
                const t = nodes.find(n => n.id === d.target);
                return `M${s.x},${s.y + s.height/2} L${t.x},${t.y - t.height/2}`;
            });

        // Link labels
        linkElements.append("rect")
            .attr("class", "link-label-bg")
            .attr("x", d => {
                const s = nodes.find(n => n.id === d.source);
                const t = nodes.find(n => n.id === d.target);
                return (s.x + t.x) / 2 - 100;
            })
            .attr("y", d => {
                const s = nodes.find(n => n.id === d.source);
                const t = nodes.find(n => n.id === d.target);
                return (s.y + s.height/2 + t.y - t.height/2) / 2 - 10;
            })
            .attr("width", 200)
            .attr("height", 20)
            .attr("rx", 4);

        linkElements.append("text")
            .attr("class", "link-label")
            .attr("x", d => {
                const s = nodes.find(n => n.id === d.source);
                const t = nodes.find(n => n.id === d.target);
                return (s.x + t.x) / 2;
            })
            .attr("y", d => {
                const s = nodes.find(n => n.id === d.source);
                const t = nodes.find(n => n.id === d.target);
                return (s.y + s.height/2 + t.y - t.height/2) / 2 + 4;
            })
            .text(d => d.label);

        // Draw nodes
        const nodeGroup = svg.append("g").attr("class", "nodes");

        const nodeElements = nodeGroup.selectAll(".node")
            .data(nodes)
            .enter()
            .append("g")
            .attr("class", d => `node node-${d.layer}`)
            .attr("transform", d => `translate(${d.x - d.width/2}, ${d.y - d.height/2})`);

        // Node rectangles
        nodeElements.append("rect")
            .attr("class", "node-rect")
            .attr("width", d => d.width)
            .attr("height", d => d.height)
            .attr("x", 0)
            .attr("y", 0);

        // Layer-specific backgrounds
        nodeElements.filter(d => d.layer === "bronze")
            .select(".node-rect")
            .style("fill", "rgba(205, 127, 50, 0.1)");

        nodeElements.filter(d => d.layer === "silver")
            .select(".node-rect")
            .style("fill", "rgba(192, 192, 192, 0.1)");

        nodeElements.filter(d => d.layer === "gold")
            .select(".node-rect")
            .style("fill", "rgba(255, 215, 0, 0.1)");

        // Icons
        nodeElements.append("text")
            .attr("class", "node-icon")
            .attr("x", d => d.width / 2)
            .attr("y", 35)
            .text(d => d.icon);

        // Titles
        nodeElements.append("text")
            .attr("class", "node-title")
            .attr("x", d => d.width / 2)
            .attr("y", 65)
            .text(d => d.title);

        // Subtitles
        nodeElements.append("text")
            .attr("class", "node-subtitle")
            .attr("x", d => d.width / 2)
            .attr("y", 85)
            .text(d => d.subtitle);

        // Metadata for bronze/silver/gold
        nodeElements.filter(d => ["bronze", "silver", "gold"].includes(d.layer))
            .append("text")
            .attr("class", "node-meta")
            .attr("x", d => d.width / 2)
            .attr("y", 110)
            .text(d => {
                if (d.layer === "bronze") return "Raw | Append-Only | Historical Backup";
                if (d.layer === "silver") return "Deduped | Typed | Parsed";
                if (d.layer === "gold") return "SummingMergeTree | BI-Ready";
            });

        // Particle system for data flow
        let particlesEnabled = true;
        const particleGroup = svg.append("g").attr("class", "particles");

        function createParticle(link) {
            if (!particlesEnabled) return;
            
            const s = nodes.find(n => n.id === link.source);
            const t = nodes.find(n => n.id === link.target);
            
            const particle = particleGroup.append("circle")
                .attr("class", "particle")
                .attr("r", 4)
                .attr("cx", s.x)
                .attr("cy", s.y + s.height/2);

            particle.transition()
                .duration(2000)
                .ease(d3.easeLinear)
                .attr("cx", t.x)
                .attr("cy", t.y - t.height/2)
                .on("end", function() {
                    d3.select(this).remove();
                    // Update counter
                    const counter = document.getElementById("record-count");
                    counter.textContent = parseInt(counter.textContent) + Math.floor(Math.random() * 1000) + 100;
                });
        }

        // Animate particles
        setInterval(() => {
            links.forEach((link, i) => {
                setTimeout(() => createParticle(link), i * 500);
            });
        }, 3000);

        // Initial burst
        setTimeout(() => {
            links.forEach(link => createParticle(link));
        }, 500);

        // Tooltip logic
        const tooltip = document.getElementById("tooltip");

        nodeElements.on("mouseenter", function(event, d) {
            tooltip.innerHTML = `
                <h3>${d.icon} ${d.title}</h3>
                <p><strong>${d.subtitle}</strong></p>
                <p>${d.details}</p>
                <span class="tag">${d.layer.toUpperCase()} LAYER</span>
            `;
            tooltip.classList.add("visible");
        });

        nodeElements.on("mousemove", function(event) {
            const diagramRect = document.getElementById("diagram").getBoundingClientRect();
            tooltip.style.left = (event.clientX - diagramRect.left + 20) + "px";
            tooltip.style.top = (event.clientY - diagramRect.top - 20) + "px";
        });

        nodeElements.on("mouseleave", function() {
            tooltip.classList.remove("visible");
        });

        // Zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.5, 2])
            .on("zoom", (event) => {
                svg.selectAll(".nodes, .links, .particles, .warehouse-group")
                    .attr("transform", event.transform);
            });

        svg.call(zoom);

        function resetZoom() {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        }

        function toggleParticles() {
            particlesEnabled = !particlesEnabled;
        }

        // Pulse animation for warehouse border
        function animateWarehouseBorder() {
            const dashOffset = 0;
            d3.select(".warehouse-bg")
                .style("stroke-dashoffset", dashOffset)
                .transition()
                .duration(30000)
                .ease(d3.easeLinear)
                .style("stroke-dashoffset", -100)
                .on("end", animateWarehouseBorder);
        }
        animateWarehouseBorder();

        // Responsive
        window.addEventListener("resize", () => {
            const container = document.getElementById("diagram");
            const aspect = width / height;
            const w = container.clientWidth;
            const h = w / aspect;
            svg.attr("viewBox", `0 0 ${width} ${height}`);
        });
    </script>
</body>
</html>
